services:
  asterisk:
    image: andrius/asterisk:latest
    container_name: helpassist-asterisk
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "8088:8088/tcp"
      - "10000-10100:10000-10100/udp"
    environment:
      - TZ=America/New_York
    volumes:
      - ./config:/etc/asterisk
