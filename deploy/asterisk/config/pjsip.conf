; Minimal PJSIP config for local prototyping.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[6001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
auth=6001-auth
aors=6001
direct_media=no

[6001-auth]
type=auth
auth_type=userpass
username=6001
password=changeme6001

[6001]
type=aor
max_contacts=1

[6002]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
auth=6002-auth
aors=6002
direct_media=no

[6002-auth]
type=auth
auth_type=userpass
username=6002
password=changeme6002

[6002]
type=aor
max_contacts=1

